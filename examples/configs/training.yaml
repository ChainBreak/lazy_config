experiment_name: cifar10_baseline

model:
  architecture: resnet18
  number_of_layers: 18
  pretrained: true

training:
  number_of_epochs: 20
  batch_size: 128
  learning_rate: 0.01
  weight_decay: 1.0e-4

optimizer:
  name: sgd
  learning_rate: 0.01
  weight_decay: 1.0e-4

dataset:
  name: cifar10
  data_root: ./data

augmentations:
  pipeline:
    - name: random_crop
      size: 224
    - name: random_horizontal_flip
      probability: 0.5
    - name: color_jitter
      brightness: 0.2
      contrast: 0.2
